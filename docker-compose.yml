services:
  db:
    image: postgres:16-alpine
    container_name: crm3-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DJANGO_DB_NAME:-crm3}
      POSTGRES_USER: ${DJANGO_DB_USER:-crm3}
      POSTGRES_PASSWORD: ${DJANGO_DB_PASSWORD:-crm3}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - type: bind
        source: ${LOCAL_BACKUP_ROOT:-./tmp/local-backup}
        target: /backup/crm3
        read_only: true
    ports:
      - "${POSTGRES_HOST_PORT:-5435}:5432"
    networks:
      - crm_network
    shm_size: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DJANGO_DB_USER:-crm3} -d ${DJANGO_DB_NAME:-crm3}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: crm30-backend:local
    container_name: crm3-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      DEBUG: "True"
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: "5432"
      RUN_MIGRATIONS: "true"
      OPEN_NOTEBOOK_MEDIA_ROOT: /app/media
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - type: bind
        source: ${LOCAL_BACKUP_MEDIA_PATH:-./tmp/local-media}
        target: /app/media
        read_only: true
      - ./runtime-secrets:/run/crm3-secrets
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  telegram_bot:
    image: crm30-backend:local
    container_name: crm3-telegram-bot
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        if [ -z "$$TELEGRAM_BOT_TOKEN" ]; then
          echo "TELEGRAM_BOT_TOKEN is empty; keeping telegram_bot idle."
          while :; do sleep 3600; done
        fi
        exec python manage.py run_telegram_bot
    env_file:
      - backend/.env
    environment:
      DEBUG: "True"
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: "5432"
      TELEGRAM_INTERNAL_API_URL: ${TELEGRAM_INTERNAL_API_URL:-http://backend:8000}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - type: bind
        source: ${LOCAL_BACKUP_MEDIA_PATH:-./tmp/local-media}
        target: /app/media
        read_only: true
      - ./runtime-secrets:/run/crm3-secrets
    networks:
      - crm_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -z \"$$TELEGRAM_BOT_TOKEN\" ]; then exit 0; fi; tr '\\0' ' ' </proc/1/cmdline | grep -q 'run_telegram_bot'",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${LOCAL_VITE_API_URL:-/api/v1}
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
    image: crm30-frontend:local
    container_name: crm3-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: crm3-nginx
    restart: unless-stopped
    ports:
      - "${LOCAL_HTTP_PORT:-80}:80"
      - "${LOCAL_BACKEND_PORT:-8000}:8000"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
      - backend_static:/app/staticfiles:ro
      - type: bind
        source: ${LOCAL_BACKUP_MEDIA_PATH:-./tmp/local-media}
        target: /app/media
        read_only: true
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - crm_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  backend_static:
    driver: local

networks:
  crm_network:
    driver: bridge
