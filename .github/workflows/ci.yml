name: CI - Code Quality & Tests

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  docker-changes:
    name: Detect Docker-Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      docker_relevant: ${{ steps.detect.outputs.docker_relevant }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Docker-related file changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.base_ref }}"
            git fetch origin "${base_ref}" --depth=1
            mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "origin/${base_ref}...HEAD")
          else
            before_sha="${{ github.event.before }}"
            if [ -z "${before_sha}" ] || [ "${before_sha}" = "0000000000000000000000000000000000000000" ]; then
              mapfile -t changed_files < <(git show --name-only --pretty='' --diff-filter=ACMRT "${{ github.sha }}")
            else
              mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "${before_sha}...${{ github.sha }}")
            fi
          fi

          docker_relevant=false
          for file in "${changed_files[@]}"; do
            case "${file}" in
              .dockerignore|docker-compose.yml|docker-compose.prod.yml|nginx.conf|backend/Dockerfile|backend/entrypoint.sh|backend/requirements.txt|frontend/Dockerfile|frontend/nginx.conf|frontend/package.json|frontend/package-lock.json)
                docker_relevant=true
                break
                ;;
            esac
          done

          echo "docker_relevant=${docker_relevant}" >> "$GITHUB_OUTPUT"

  secret-scan:
    name: Secret Scan (changed files)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets==1.5.0

      - name: Scan changed files for secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.base_ref }}"
            git fetch origin "${base_ref}" --depth=1
            mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "origin/${base_ref}...HEAD")
          else
            before_sha="${{ github.event.before }}"
            if [ -z "${before_sha}" ] || [ "${before_sha}" = "0000000000000000000000000000000000000000" ]; then
              mapfile -t changed_files < <(git show --name-only --pretty='' --diff-filter=ACMRT "${{ github.sha }}")
            else
              mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "${before_sha}...${{ github.sha }}")
            fi
          fi

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No changed files to scan."
            exit 0
          fi

          scan_files=()
          for file in "${changed_files[@]}"; do
            if [ -f "${file}" ]; then
              case "${file}" in
                mailcow/*|frontend/package-lock.json)
                  continue
                  ;;
              esac
              scan_files+=("${file}")
            fi
          done

          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No eligible changed files for secret scan."
            exit 0
          fi

          detect-secrets-hook "${scan_files[@]}"

  backend-lint:
    name: Backend Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install black isort ruff

      - name: Run Black (formatting check)
        run: black --check backend/

      - name: Run isort (import sorting)
        run: isort --check-only backend/

      - name: Run Ruff (linting)
        run: ruff check backend/

  backend-tests-core:
    name: Backend Tests (Core)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm3_test
          POSTGRES_USER: crm3
          POSTGRES_PASSWORD: crm3 # pragma: allowlist secret
        options: >-
          --health-cmd "pg_isready -U crm3 -d crm3_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-django pytest-cov pytest-xdist

      - name: Restore Google Drive credentials
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/drive-sa.json"
          chmod 600 "$RUNNER_TEMP/drive-sa.json"

      - name: Run core backend tests
        env:
          DEBUG: 'False'
          DJANGO_DB_ENGINE: django.db.backends.postgresql
          DJANGO_DB_HOST: localhost
          DJANGO_DB_PORT: '5432'
          DJANGO_DB_NAME: crm3_test
          DJANGO_DB_USER: crm3
          DJANGO_DB_PASSWORD: crm3 # pragma: allowlist secret
          DJANGO_SECRET_KEY: test-secret-key # pragma: allowlist secret
          ALLOWED_HOSTS: localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE: ${{ runner.temp }}/drive-sa.json
          COVERAGE_FILE: .coverage.core
        run: |
          cd backend
          pytest -v -n 4 --dist=loadfile --durations=20 --cov=. --cov-report= backend/tests backend/apps/users/tests.py backend/apps/common/tests backend/apps/clients/tests.py

      - name: Upload core coverage data
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-core
          path: backend/.coverage.core

  backend-tests-domain:
    name: Backend Tests (Domain)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm3_test
          POSTGRES_USER: crm3
          POSTGRES_PASSWORD: crm3 # pragma: allowlist secret
        options: >-
          --health-cmd "pg_isready -U crm3 -d crm3_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-django pytest-cov pytest-xdist

      - name: Restore Google Drive credentials
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/drive-sa.json"
          chmod 600 "$RUNNER_TEMP/drive-sa.json"

      - name: Run domain backend tests
        env:
          DEBUG: 'False'
          DJANGO_DB_ENGINE: django.db.backends.postgresql
          DJANGO_DB_HOST: localhost
          DJANGO_DB_PORT: '5432'
          DJANGO_DB_NAME: crm3_test
          DJANGO_DB_USER: crm3
          DJANGO_DB_PASSWORD: crm3 # pragma: allowlist secret
          DJANGO_SECRET_KEY: test-secret-key # pragma: allowlist secret
          ALLOWED_HOSTS: localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE: ${{ runner.temp }}/drive-sa.json
          COVERAGE_FILE: .coverage.domain
        run: |
          cd backend
          pytest -v -n 4 --dist=loadfile --durations=20 --cov=. --cov-report= backend/apps/deals/tests backend/apps/chat/tests backend/apps/notes/tests.py backend/apps/tasks/tests.py backend/apps/mailboxes/tests.py backend/apps/documents/tests.py

      - name: Upload domain coverage data
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-domain
          path: backend/.coverage.domain

  backend-tests-finance:
    name: Backend Tests (Finance)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm3_test
          POSTGRES_USER: crm3
          POSTGRES_PASSWORD: crm3 # pragma: allowlist secret
        options: >-
          --health-cmd "pg_isready -U crm3 -d crm3_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-django pytest-cov pytest-xdist

      - name: Restore Google Drive credentials
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/drive-sa.json"
          chmod 600 "$RUNNER_TEMP/drive-sa.json"

      - name: Run finance backend tests
        env:
          DEBUG: 'False'
          DJANGO_DB_ENGINE: django.db.backends.postgresql
          DJANGO_DB_HOST: localhost
          DJANGO_DB_PORT: '5432'
          DJANGO_DB_NAME: crm3_test
          DJANGO_DB_USER: crm3
          DJANGO_DB_PASSWORD: crm3 # pragma: allowlist secret
          DJANGO_SECRET_KEY: test-secret-key # pragma: allowlist secret
          ALLOWED_HOSTS: localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE: ${{ runner.temp }}/drive-sa.json
          COVERAGE_FILE: .coverage.finance
        run: |
          cd backend
          pytest -v -n 4 --dist=loadfile --durations=20 --cov=. --cov-report= backend/apps/policies/tests backend/apps/finances/tests.py backend/apps/notifications/tests.py

      - name: Upload finance coverage data
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-finance
          path: backend/.coverage.finance

  backend-coverage-merge:
    name: Backend Coverage Merge
    runs-on: ubuntu-latest
    needs: [backend-tests-core, backend-tests-domain, backend-tests-finance]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install coverage tools
        run: |
          python -m pip install --upgrade pip
          pip install coverage

      - name: Download backend coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts

      - name: Combine backend coverage and export XML
        run: |
          python -m coverage combine coverage-artifacts/backend-coverage-core/.coverage.core coverage-artifacts/backend-coverage-domain/.coverage.domain coverage-artifacts/backend-coverage-finance/.coverage.finance
          python -m coverage xml -o backend/coverage.xml

      - name: Upload combined backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
        continue-on-error: true

  frontend-quality:
    name: Frontend Linting, Format & Type Checking
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Run Prettier (format check)
        run: |
          cd frontend
          npm run format:check

      - name: Check TypeScript
        run: |
          cd frontend
          npx tsc --noEmit

  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --no-audit --prefer-offline

      - name: Run frontend unit tests
        run: |
          cd frontend
          npm run test:ci

  frontend-build:
    name: Frontend Build Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --no-audit --prefer-offline

      - name: Build project
        run: |
          cd frontend
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      [
        docker-changes,
        secret-scan,
        backend-lint,
        backend-tests-core,
        backend-tests-domain,
        backend-tests-finance,
        backend-coverage-merge,
        frontend-quality,
        frontend-tests,
        frontend-build,
      ]
    if: github.event_name == 'push' || needs.docker-changes.outputs.docker_relevant == 'true'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: crm30-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: crm30-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      [
        docker-changes,
        secret-scan,
        backend-lint,
        backend-tests-core,
        backend-tests-domain,
        backend-tests-finance,
        backend-coverage-merge,
        frontend-quality,
        frontend-tests,
        frontend-build,
        docker-build,
      ]
    if: always()

    steps:
      - name: Check workflow status
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ needs.backend-lint.result }}" = "failure" ]; then
            echo "Backend lint failed"
            exit 1
          fi
          if [ "${{ needs.secret-scan.result }}" = "failure" ]; then
            echo "Secret scan failed"
            exit 1
          fi
          if [ "${{ needs.backend-tests-core.result }}" = "failure" ] || [ "${{ needs.backend-tests-domain.result }}" = "failure" ] || [ "${{ needs.backend-tests-finance.result }}" = "failure" ]; then
            echo "Backend shard tests failed"
            exit 1
          fi
          if [ "${{ needs.backend-coverage-merge.result }}" = "failure" ]; then
            echo "Backend coverage merge failed"
            exit 1
          fi
          if [ "${{ needs.frontend-quality.result }}" = "failure" ]; then
            echo "Frontend quality checks failed"
            exit 1
          fi
          if [ "${{ needs.frontend-tests.result }}" = "failure" ]; then
            echo "Frontend tests failed"
            exit 1
          fi
          if [ "${{ needs.frontend-build.result }}" = "failure" ]; then
            echo "Frontend build failed"
            exit 1
          fi

          docker_required=false
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ needs.docker-changes.outputs.docker_relevant }}" = "true" ]; then
            docker_required=true
          fi

          if [ "${docker_required}" = "true" ] && [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "Docker build failed or was skipped unexpectedly"
            exit 1
          fi

          if [ "${docker_required}" = "false" ] && [ "${{ needs.docker-build.result }}" = "failure" ]; then
            echo "Docker build failed"
            exit 1
          fi

          echo "All quality checks passed!"
